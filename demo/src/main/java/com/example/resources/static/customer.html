<!DOCTYPE html>
<html>
<head>
    <title>Code Bank - Customer Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1600")
            no-repeat center center/cover;
        }

        .login-box{
            width:400px;
            background:rgba(255,255,255,0.95);
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#003366;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0055aa;
        }

        #result{
            text-align:center;
            margin-top:15px;
            color:red;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h1>CODE BANK</h1>

    <input type="number"
        id="acc_num"
    placeholder="Account Number">

    <input type="password"
    id="pin"
    placeholder="PIN">

    <button onclick="login()">
        Login
    </button>

    <p id="result"></p>

</div>

<script>

function login(){

    let acc_num =
        document.getElementById("acc_num").value;

    let pin =
        document.getElementById("pin").value;

    fetch(`/login?acc_num=${acc_num}&pin=${pin}`,{
    method:"POST"

    } )

    .then(response => response.text())

    .then(data => {

        if(data.includes("Welcome")){
    localStorage.setItem("customerData", data);
    localStorage.setItem("acc_num", acc_num);
    window.location.href = "dashboard.html";


        }
        else{

            document.getElementById("result")
                    .innerHTML = data;
        }

    })

    .catch(error => {
    document.getElementById("result").innerHTML =
        "ERROR: " + error;

    });

}

</script>

</body>
</html>
