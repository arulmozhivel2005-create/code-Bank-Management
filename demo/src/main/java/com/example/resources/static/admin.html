<!DOCTYPE html>
<html>
<head>

    <title>Admin Login</title>

    <style>

        body{
            font-family:Arial;
            background:#e3f2fd;
        }

        .box{
            width:400px;
            background:white;
            margin:auto;
            margin-top:120px;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#0d47a1;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#0d47a1;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#1565c0;
        }

        #result{
            margin-top:20px;
            text-align:center;
            color:red;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🏦 Admin Login</h1>

    <input type="text"
        id="username"
        placeholder="Enter Username">

    <input type="password"
        id="password"
        placeholder="Enter Password">

    <button onclick="adminLogin()">
        Login
    </button>

    <div id="result"></div>

</div>

<script>

function adminLogin(){

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    fetch(`/adminLogin?username=${username}&password=${password}`,
    {
        method:"POST"
    })

    .then(res => res.text())

    .then(data => {

        if(data.includes("Success")){

            window.location.href =
                "adminDashboard.html";
        }

        else{

            document.getElementById("result")
            .innerHTML = data;
        }

    });

}

</script>

</body>
</html>
