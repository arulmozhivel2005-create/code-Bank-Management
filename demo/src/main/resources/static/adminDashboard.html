<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    background:url("https://yi-files.yellowimages.com/products/1041000/1041105/1734614-full.jpg")
    no-repeat center center/cover;
    min-height:100vh;
    padding:20px;
}

h1 {
    text-align:center;
    color:black;
    margin-bottom:5px;
}

.subtitle {
    text-align:center;
    color:darkcyan;
    margin-bottom:25px;
    text-shadow:0px 0px 5px black;
}

.container {
    max-width:600px;
    margin:auto;
}

.accordion {
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    margin-bottom:15px;
    overflow:hidden;
}

.accordion-header {
    padding:18px 20px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:16px;
    font-weight:bold;
    color:white;
    user-select:none;
}

.accordion-header.add    { background:#1565c0; }
.accordion-header.update { background:#2e7d32; }
.accordion-header.delete { background:#c62828; }

.accordion-header:hover { opacity:0.9; }

.arrow {
    font-size:18px;
    transition:transform 0.3s;
}

.accordion-header.open .arrow {
    transform:rotate(180deg);
}

.accordion-body {
    display:none;
    padding:20px;
    border-top:1px solid #eee;
}

.accordion-body.open {
    display:block;
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

/* Remove number input arrows */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"] {
    -moz-appearance: textfield;
}

button {
    width:100%;
    padding:12px;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
    margin-top:5px;
}

.btn-add    { background:#1565c0; }
.btn-update { background:#2e7d32; }
.btn-delete { background:#c62828; }

button:hover { opacity:0.85; }

.result {
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    padding:8px;
    border-radius:5px;
}

.success { color:green; background:#e8f5e9; }
.error   { color:red;   background:#ffebee; }

.logout {
    text-align:center;
    margin-top:20px;
}

.logout button {
    width:150px;
    background:#555;
}
</style>
</head>
<body>

<h1>🏦 CODE BANK</h1>
<p class="subtitle">Admin Dashboard</p>

<div class="container">

    <!-- ADD CUSTOMER -->
    <div class="accordion">
        <div class="accordion-header add" onclick="toggle(this)">
            <span>➕ Add Customer</span>
            <span class="arrow">▼</span>
        </div>
        <div class="accordion-body">
            <input type="text"   id="add_name"    placeholder="Full Name">
            <input type="number" id="add_acc"     placeholder="Account Number">
            <input type="number" id="add_pin"     placeholder="PIN">
            <input type="number" id="add_balance" placeholder="Initial Balance">
            <button class="btn-add" onclick="addCustomer()">Add Customer</button>
            <p class="result" id="addResult"></p>
        </div>
    </div>

    <!-- UPDATE CUSTOMER -->
    <div class="accordion">
        <div class="accordion-header update" onclick="toggle(this)">
            <span>✏️ Update Customer</span>
            <span class="arrow">▼</span>
        </div>
        <div class="accordion-body">
            <input type="number" id="upd_acc"  placeholder="Account Number">
            <input type="text"   id="upd_name" placeholder="New Name">
            <button class="btn-update" onclick="updateCustomer()">Update Customer</button>
            <p class="result" id="updateResult"></p>
        </div>
    </div>

    <!-- DELETE CUSTOMER -->
    <div class="accordion">
        <div class="accordion-header delete" onclick="toggle(this)">
            <span>🗑️ Delete Customer</span>
            <span class="arrow">▼</span>
        </div>
        <div class="accordion-body">
            <input type="number" id="del_acc" placeholder="Account Number">
            <button class="btn-delete" onclick="deleteCustomer()">Delete Customer</button>
            <p class="result" id="deleteResult"></p>
        </div>
    </div>

</div>

<div class="logout">
    <button onclick="logout()">🚪 Logout</button>
</div>

<script>

// ACCORDION TOGGLE
function toggle(header) {
    const body = header.nextElementSibling;
    const isOpen = body.classList.contains("open");

    document.querySelectorAll(".accordion-body").forEach(b => b.classList.remove("open"));
    document.querySelectorAll(".accordion-header").forEach(h => h.classList.remove("open"));

    if (!isOpen) {
        body.classList.add("open");
        header.classList.add("open");
    }
}

// ADD CUSTOMER
function addCustomer() {
    let name    = document.getElementById("add_name").value;
    let acc_num = document.getElementById("add_acc").value;
    let pin     = document.getElementById("add_pin").value;
    let balance = document.getElementById("add_balance").value;
    let result  = document.getElementById("addResult");

    if (!name || !acc_num || !pin || !balance) {
        result.className = "result error";
        result.innerHTML = "Please fill all fields";
        return;
    }

    fetch(`http://localhost:8080/addCustomer?name=${name}&acc_num=${acc_num}&pin=${pin}&balance=${balance}`,
        { method: "POST" })
    .then(res => res.text())
    .then(data => {
        result.className = data.includes("Successfully") ? "result success" : "result error";
        result.innerHTML = data;

        // ✅ Clear fields only on success
        if (data.includes("Successfully")) {
            document.getElementById("add_name").value    = "";
            document.getElementById("add_acc").value     = "";
            document.getElementById("add_pin").value     = "";
            document.getElementById("add_balance").value = "";
        }
    })
    .catch(() => {
        result.className = "result error";
        result.innerHTML = "Server Connection Error";
    });
}

// UPDATE CUSTOMER
function updateCustomer() {
    let acc_num = document.getElementById("upd_acc").value;
    let name    = document.getElementById("upd_name").value;
    let result  = document.getElementById("updateResult");

    if (!acc_num || !name) {
        result.className = "result error";
        result.innerHTML = "Please fill all fields";
        return;
    }

    fetch(`http://localhost:8080/updateCustomer?acc_num=${acc_num}&name=${name}`,
        { method: "PUT" })
    .then(res => res.text())
    .then(data => {
        result.className = data.includes("Successfully") ? "result success" : "result error";
        result.innerHTML = data;

        // ✅ Clear fields only on success
        if (data.includes("Successfully")) {
            document.getElementById("upd_acc").value  = "";
            document.getElementById("upd_name").value = "";
        }
    })
    .catch(() => {
        result.className = "result error";
        result.innerHTML = "Server Connection Error";
    });
}

// DELETE CUSTOMER
function deleteCustomer() {
    let acc_num = document.getElementById("del_acc").value;
    let result  = document.getElementById("deleteResult");

    if (!acc_num) {
        result.className = "result error";
        result.innerHTML = "Please enter account number";
        return;
    }

    if (!confirm("Are you sure you want to delete this customer?")) return;

    fetch(`http://localhost:8080/deleteCustomer?acc_num=${acc_num}`,
        { method: "DELETE" })
    .then(res => res.text())
    .then(data => {
        result.className = data.includes("Successfully") ? "result success" : "result error";
        result.innerHTML = data;

        // ✅ Clear fields only on success
        if (data.includes("Successfully")) {
            document.getElementById("del_acc").value = "";
        }
    })
    .catch(() => {
        result.className = "result error";
        result.innerHTML = "Server Connection Error";
    });
}

// LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "admin.html";
}

</script>
</body>
</html>
