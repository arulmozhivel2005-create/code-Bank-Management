<!DOCTYPE html>
<html>
<head>
    <title>Code Bank - Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 15px;
            background: #003366;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0055aa;
        }

        h2 {
            color: #003366;
        }
    </style>
</head>

<body>

<h1>ADMIN DASHBOARD</h1>

<!-- ================= ADMIN LOGIN ================= -->
<div class="box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="adminLogin()">Login</button>

    <p id="loginResult"></p>
</div>

<!-- ================= ADD CUSTOMER ================= -->
<div class="box">
    <h2>Add Customer</h2>

    <input type="number" id="acc_num" placeholder="Account Number">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="pin" placeholder="PIN">
    <input type="number" id="balance" placeholder="Balance">

    <button onclick="addCustomer()">Add</button>

    <p id="addResult"></p>
</div>

<!-- ================= UPDATE CUSTOMER ================= -->
<div class="box">
    <h2>Update Customer</h2>

    <input type="number" id="u_acc" placeholder="Account Number">
    <input type="text" id="u_name" placeholder="New Name">

    <button onclick="updateCustomer()">Update</button>

    <p id="updateResult"></p>
</div>

<!-- ================= DELETE CUSTOMER ================= -->
<div class="box">
    <h2>Delete Customer</h2>

    <input type="number" id="d_acc" placeholder="Account Number">

    <button onclick="deleteCustomer()">Delete</button>

    <p id="deleteResult"></p>
</div>

<script>

const BASE_URL = "https://code-bank-management.up.railway.app";

// ================= ADMIN LOGIN =================


    
// ================= ADD CUSTOMER =================
function addCustomer() {

    let acc_num = document.getElementById("acc_num").value;
    let name = document.getElementById("name").value;
    let pin = document.getElementById("pin").value;
    let balance = document.getElementById("balance").value;

    fetch(BASE_URL + "/addCustomer", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            acc_num: acc_num,
            name: name,
            pin: pin,
            balance: balance
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("addResult").innerText = data;
    })
    .catch(err => {
        document.getElementById("addResult").innerText = err;
    });
}

// ================= UPDATE CUSTOMER =================
function updateCustomer() {

    let acc_num = document.getElementById("u_acc").value;
    let name = document.getElementById("u_name").value;

    fetch(BASE_URL + "/updateCustomer", {
        method: "PUT",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            acc_num: acc_num,
            name: name
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("updateResult").innerText = data;
    })
    .catch(err => {
        document.getElementById("updateResult").innerText = err;
    });
}

// ================= DELETE CUSTOMER =================
function deleteCustomer() {

    let acc_num = document.getElementById("d_acc").value;

    fetch(BASE_URL + "/deleteCustomer", {
        method: "DELETE",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            acc_num: acc_num
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("deleteResult").innerText = data;
    })
    .catch(err => {
        document.getElementById("deleteResult").innerText = err;
    });
}

</script>

</body>
</html>
