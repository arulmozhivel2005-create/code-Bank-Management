<!DOCTYPE html>
<html>
<head>
    <title>Code Bank - Admin Dashboard</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            padding:20px;
        }

        .box{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            padding:10px;
            margin:5px;
            width:220px;
        }

        button{
            padding:10px 15px;
            background:#003366;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0055aa;
        }

        h1,h2{
            color:#003366;
        }

        #adminActions{
            display:none;
        }
    </style>
</head>

<body>

<h1>CODE BANK - ADMIN PANEL</h1>

<!-- LOGIN -->

<div class="box" id="loginBox">

    <h2>Admin Login</h2>

    <input type="text"
           id="username"
           placeholder="Username">

    <input type="password"
           id="password"
           placeholder="Password">

    <br><br>

    <button onclick="adminLogin()">
        Login
    </button>

    <p id="loginResult"></p>

</div>

<!-- DASHBOARD -->

<div id="adminActions">

    <!-- ADD CUSTOMER -->

    <div class="box">

        <h2>Add Customer</h2>

        <input type="number" id="acc_num" placeholder="Account Number">
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="pin" placeholder="PIN">
        <input type="number" id="balance" placeholder="Balance">

        <br><br>

        <button onclick="addCustomer()">
            Add Customer
        </button>

        <p id="addResult"></p>

    </div>

    <!-- UPDATE CUSTOMER -->

    <div class="box">

        <h2>Update Customer</h2>

        <input type="number"
               id="u_acc"
               placeholder="Account Number">

        <input type="text"
               id="u_name"
               placeholder="New Name">

        <br><br>

        <button onclick="updateCustomer()">
            Update Customer
        </button>

        <p id="updateResult"></p>

    </div>

    <!-- DELETE CUSTOMER -->

    <div class="box">

        <h2>Delete Customer</h2>

        <input type="number"
               id="d_acc"
               placeholder="Account Number">

        <br><br>

        <button onclick="deleteCustomer()">
            Delete Customer
        </button>

        <p id="deleteResult"></p>

    </div>

</div>

<script>

const BASE_URL =
"https://code-bank-management.up.railway.app";


// ADMIN LOGIN

function adminLogin(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    fetch(BASE_URL + "/adminLogin", {

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({
            username:username,
            password:password
        })

    })

    .then(res=>res.text())

    .then(data=>{

        document.getElementById(
        "loginResult").innerText=data;

        if(data.includes(
        "Admin Login Success")){

            document.getElementById(
            "loginBox").style.display="none";

            document.getElementById(
            "adminActions").style.display="block";
        }
    })

    .catch(err=>{
        document.getElementById(
        "loginResult").innerText=err;
    });
}


// ADD CUSTOMER

function addCustomer(){

    fetch(BASE_URL + "/addCustomer",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({

            acc_num:
            document.getElementById("acc_num").value,

            name:
            document.getElementById("name").value,

            pin:
            document.getElementById("pin").value,

            balance:
            document.getElementById("balance").value
        })
    })

    .then(res=>res.text())
    .then(data=>{
        document.getElementById(
        "addResult").innerText=data;
    });
}


// UPDATE CUSTOMER

function updateCustomer(){

    fetch(BASE_URL + "/updateCustomer",{

        method:"PUT",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({

            acc_num:
            document.getElementById("u_acc").value,

            name:
            document.getElementById("u_name").value
        })
    })

    .then(res=>res.text())
    .then(data=>{
        document.getElementById(
        "updateResult").innerText=data;
    });
}


// DELETE CUSTOMER

function deleteCustomer(){

    fetch(BASE_URL + "/deleteCustomer",{

        method:"DELETE",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({

            acc_num:
            document.getElementById("d_acc").value
        })
    })

    .then(res=>res.text())
    .then(data=>{
        document.getElementById(
        "deleteResult").innerText=data;
    });
}

</script>

</body>
</html>
