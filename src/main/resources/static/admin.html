<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Code Bank</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:url("https://yi-files.yellowimages.com/products/1041000/1041105/1734614-full.jpg") no-repeat center center/cover;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:380px;
            background:rgba(255,255,255,0.95);
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#003366;
            margin-bottom:10px;
        }

        h3{
            color:#555;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#003366;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0055aa;
        }

        #loginResult{
            margin-top:15px;
            font-weight:bold;
            color:red;
        }

        .back-btn{
            background:#666;
            margin-top:10px;
        }

        .back-btn:hover{
            background:#444;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>🏦 CODE BANK</h1>
    <h3>Admin Login</h3>

    <input
        type="text"
        id="username"
        placeholder="Enter Username">

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <button onclick="adminLogin()">
        Login
    </button>

    <button class="back-btn" onclick="goHome()">
        Back
    </button>

    <p id="loginResult"></p>

</div>

<script>

const BASE_URL = "https://code-bank-management.up.railway.app";

function adminLogin(){

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    if(username==="" || password===""){
        document.getElementById("loginResult").innerText =
        "Please enter username and password.";
        return;
    }

    fetch(BASE_URL + "/adminLogin",{

        method:"POST",

        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({
            username:username,
            password:password
        })

    })

    .then(res=>res.text())

    .then(data=>{

        if(data.includes("Admin Login Success")){

            // Clear login fields
            document.getElementById("username").value="";
            document.getElementById("password").value="";
            document.getElementById("loginResult").innerText="";

            // Redirect to dashboard
            window.location.href="admindashboard.html";

        }else{

            document.getElementById("loginResult").innerText=data;

            // Clear password after failed login
            document.getElementById("password").value="";
        }

    })

    .catch(()=>{

        document.getElementById("loginResult").innerText=
        "Unable to connect to server.";

    });

}

function goHome(){
    window.location.href="index.html";
}

// Press Enter to login
document.addEventListener("keypress",function(event){
    if(event.key==="Enter"){
        adminLogin();
    }
});

</script>

</body>
</html>
