<!DOCTYPE html>
<html>
<head>
    <title>CODE BANK MANAGEMENT SYSTEM</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:url("https://images.unsplash.com/photo-1601597111158-2fceff292cdc?w=1600")
            no-repeat center center/cover;
            height:100vh;
        }

        .overlay{
            width:100%;
            height:100vh;
            background:rgba(0,0,0,0.5);
        }

        h1{
            text-align:center;
            color:white;
            padding-top:40px;
            font-size:45px;
        }

        .container{
            display:flex;
            justify-content:center;
            gap:50px;
            margin-top:100px;
        }

        .card{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        .card h2{
            color:#003366;
            margin-bottom:20px;
        }

        .card p{
            color:#555;
            margin-bottom:20px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#003366;
            color:white;
            text-decoration:none;
            border-radius:5px;
            font-size:18px;
        }

        .btn:hover{
            background:#0055aa;
        }

    </style>

</head>

<body>

<div class="overlay">

    <h1>🏦 CODE BANK MANAGEMENT SYSTEM</h1>

    <div class="container">

        <div class="card">

            <h2>Customer Banking</h2>

            <p>
                Access your account, check balance,
                and manage your banking services securely.
            </p>

            <a href="customer.html" class="btn">
                Customer Login
            </a>

        </div>

        <div class="card">

            <h2>Admin Portal</h2>

            <p>
                Add customers, update records,
                delete accounts and manage the banking system.
            </p>

            <a href="admin.html" class="btn">
                Admin Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
